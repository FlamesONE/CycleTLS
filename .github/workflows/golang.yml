name: 🚀 🐹 Go Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: Test
        working-directory: ./cycletls
        run: go test -v ./...
