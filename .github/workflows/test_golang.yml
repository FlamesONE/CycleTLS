name: 🧪 🐹 Go Integration/Unit Tests

on: [push]

jobs:
  unit-tests:
    name: Unit Tests
    strategy:
      matrix:
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Download Dependencies
        working-directory: ./cycletls
        run: go mod download

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: Unit Test
        working-directory: ./cycletls
        run: go test --race -v ./...

  integration-tests:
    name: Integration Tests (Non-Blocking)
    strategy:
      matrix:
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Non-blocking: failures don't fail the workflow
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Download Dependencies
        working-directory: ./cycletls
        run: go mod download

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: Start SOCKS Proxy (only on ubuntu)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          docker run -d -p 9050:9050 dperson/torproxy

      - name: Integration Tests (excluding tlsfingerprint)
        working-directory: ./cycletls
        run: |
          go test --race -v -tags=integration ./tests/integration/... -skip 'tlsfingerprint'

  tlsfingerprint-tests:
    name: TLS Fingerprint Tests (Blocking)
    strategy:
      matrix:
        go-version: ['1.24']
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    # Blocking: failures fail the workflow

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: ./cycletls/go.sum

      - name: Download Dependencies
        working-directory: ./cycletls
        run: go mod download

      - name: Build
        working-directory: ./cycletls
        run: go build -v ./...

      - name: TLS Fingerprint Integration Tests
        working-directory: ./cycletls
        run: go test --race -v -tags=integration ./tests/integration/tlsfingerprint/...
